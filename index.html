<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gallix</h1>

    <div class="gameCont">
        <div class="info">
        <p id="point">Points: 0</p>
        <p id="wave">Wave: 1</p>
        <p id="hs">High Score: 0</p>
        </div>
        <dialog class="lostMessage">
            <h3>You Lost</h3>
            <p>Better luck next time</p>
            <button id="retry">Retry?</button>
              </dialog>
          <div class="controls">
        <button id="up">Up</button>
        <button id="shoot">shoot</button>
        <button id="down">Down</button>
    </div>
    <canvas id="canvas" height="400" width="650">
     
    </canvas>
  <div class="startCont">
    <div class="title">
    <h3>Welcome to Gallix</h3>
    <h4>How to Play:</h4>
    </div>
    <div class="help">
        
        <div class="cardHold">
        <div class="card">
        <h5>Mobile controls</h5>
        <img src="Mobile.png">
            </div>
            <div class="card">
        <h5>Keyboard controls</h5>
        <img src="Controls.png">
            </div>
             <div class="card">
        <h5>Characters</h5>
        <img src="Character_Identification.png">
            </div>
            </div>
           
    </div>

    <button id="start">Start</button>
   </div>
    </div>
   
   <script src="Value.js"></script>
    <script src="main.js"></script>

</body>
</html>
